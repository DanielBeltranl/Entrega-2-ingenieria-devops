<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATP Tennis Rankings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header p {
      color: #666;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    section { margin-bottom: 3rem; }

    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4ade80;
      margin-bottom: 1rem;
    }

    /* Rankings table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      padding: 0 0.75rem 0.75rem;
    }

    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-top: 1px solid #1a1a1a;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #111; }

    tbody td {
      padding: 0.9rem 0.75rem;
      font-size: 0.95rem;
    }

    tbody td:first-child { padding-left: 0; }

    .rank-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4ade80;
      width: 2rem;
    }

    .player-name { font-weight: 600; color: #fff; }

    .flag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #555;
      background: #1a1a1a;
      border-radius: 3px;
      padding: 2px 5px;
      margin-left: 0.4rem;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }

    .points {
      color: #a3a3a3;
      font-variant-numeric: tabular-nums;
    }

    .height { color: #555; font-size: 0.85rem; }


    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4ade80; }
    input[type="text"]::placeholder { color: #444; }

    button {
      background: #4ade80;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #22c55e; }
    button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

    /* Search results */
    .results-list {
      display: grid;
      gap: 0.5rem;
    }

    .result-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .result-name { font-weight: 600; color: #fff; flex: 1; }
    .result-meta { font-size: 0.82rem; color: #555; }

    .empty { color: #444; font-size: 0.9rem; padding: 1rem 0; }
    .loading { color: #444; font-size: 0.85rem; }
    .error { color: #f87171; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ATP Ranking, temporada 2024.</h1>
      <p> Data historica ATP Tour</p>
    </header>

    <section>
      <h2>Top 5 ranking ATP</h2>
      <div id="rankings-container">
        <p class="loading">Cargando...</p>
      </div>
    </section>

    <section>
      <h2>Busqueda por nombre</h2>
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Search player name..."
          minlength="2"
          autocomplete="off"
        />
        <button id="search-btn">Search</button>
      </div>
      <div id="search-results"></div>
    </section>
  </div>

  <script>
    const BASE = '/api';

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    async function loadRankings() {
      const container = document.getElementById('rankings-container');
      try {
        const res = await fetch(`${BASE}/rankings/top`);
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Jugador</th>
                <th>Puntos</th>
                <th>Altura</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(p => `
                <tr>
                  <td class="rank-num">${p.rank}</td>
                  <td class="player-name">
                    ${esc(p.name)}
                    <span class="flag">${esc(p.country)}</span>
                  </td>
                  <td class="points">${p.points.toLocaleString()}</td>
                  <td class="height">${p.height ? p.height + ' cm' : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch (e) {
        container.innerHTML = `<p class="error">Failed to load rankings.</p>`;
      }
    }

    async function searchPlayers(q) {
      const container = document.getElementById('search-results');
      container.innerHTML = `<p class="loading">Searching...</p>`;
      try {
        const res = await fetch(`${BASE}/players/search?q=${encodeURIComponent(q)}`);
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        if (!data.length) {
          container.innerHTML = `<p class="empty">No players found for "${esc(q)}".</p>`;
          return;
        }
        container.innerHTML = `<div class="results-list">
          ${data.map(p => `
            <div class="result-card">
              <span class="result-name">${esc(p.name)}</span>
              <span class="result-meta">${esc(p.country)}${p.height ? ' · ' + p.height + ' cm' : ''}</span>
            </div>
          `).join('')}
        </div>`;
      } catch (e) {
        container.innerHTML = `<p class="error">Search failed. Try again.</p>`;
      }
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      if (q.length >= 2) searchPlayers(q);
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    loadRankings();
  </script>
</body>
</html>
