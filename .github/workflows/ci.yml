name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest test_api.py -v

  security:
    name: Analisis de seguridad
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Install project dependencies for Snyk
        run: pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk dependency scan
        run: |
          echo "──────────────────────────────────────"
          echo "  Snyk: scanning requirements.txt"
          echo "──────────────────────────────────────"
          snyk test \
            --severity-threshold=high \
            --file=requirements.txt \
            --package-manager=pip \
            --show-vulnerable-paths=all
          echo "──────────────────────────────────────"
          echo "  Snyk: no high/critical CVEs found"
          echo "──────────────────────────────────────"

  deploy:
    name: Deploy (DigitalOcean)
    needs: security
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker --now
            fi

            REPO_DIR=/opt/tennis-api

            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git pull
            else
              git clone https://github.com/${{ github.repository }}.git $REPO_DIR
              cd $REPO_DIR
            fi

            [ -f .env ] || echo "APP_PORT=8000" > .env

            echo "=== DB file check ==="
            if [ -d "/opt/tennis-api-db/database.sqlite" ]; then
              echo "Fixing: database.sqlite is a directory, moving file out"
              mv /opt/tennis-api-db/database.sqlite/database.sqlite /opt/tennis-api-db/database.sqlite.tmp
              rm -rf /opt/tennis-api-db/database.sqlite
              mv /opt/tennis-api-db/database.sqlite.tmp /opt/tennis-api-db/database.sqlite
            fi
            chmod 755 /opt/tennis-api-db
            chmod 644 /opt/tennis-api-db/database.sqlite
            ls -la /opt/tennis-api-db/

            docker compose down -v
            docker compose up -d --build
            echo "=== Container DB check ==="
            docker compose exec -T tennis-api ls -la /app/database.sqlite || echo "ERROR: DB not visible inside container"
            
            

            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/api/rankings/top > /dev/null; then
                echo "Deploy OK"
                docker ps
                exit 0
              fi
              echo "Waiting... ($i/10)"
              sleep 3
            done

            echo "Health check failed"
            docker compose logs
            exit 1
